<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cinévia</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar">
        <div class="logo-box">
            <img src="video-editing.png" alt="logo" width="30" height="30">
            <h1>Cinévia</h1>
        </div>

        <div class="menu">
            <a href="#">Accueil</a>
            <a href="#">Films</a>
            <a href="#">Favoris</a>
        </div>

        <input type="text" placeholder="Rechercher...">
    </nav>

    
    <section class="hero">

        <div class="hero-text">
            <div  class="title-box">
                <img src="video.png" alt="vediologo" >
                <h2>Découvrez les meilleurs films </h2>
                </div>
                <p>Explorez, recherchez et ajoutez vos films préférés</p>
                <button>Explorer maintenant</button>
            </div>
                            

        </div>
    </section>

  
    <section class="filters">
        <button>Tous</button>
        <button>Action</button>
        <button>Comédie</button>
        <button>Horror</button>
    </section>

</body>
</html>
